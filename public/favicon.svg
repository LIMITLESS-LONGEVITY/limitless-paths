  <line class="r" x1="12" y1="21" x2="12" y2="1" stroke-width="2" stroke-linecap="round" />
  <line class="r" x1="12" y1="21" x2="17.5" y2="2.5" stroke-width="2" stroke-linecap="round" />
  <line class="r" x1="12" y1="21" x2="22" y2="5" stroke-width="2" stroke-linecap="round" />
