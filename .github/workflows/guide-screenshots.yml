name: Refresh Guide Screenshots

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      role:
        description: 'Specific role to capture (or "all")'
        required: false
        default: 'all'

jobs:
  capture:
    name: Capture Guide Screenshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Capture screenshots
        run: |
          ROLE_ARG="${{ github.event.inputs.role || 'all' }}"
          if [ "$ROLE_ARG" = "all" ]; then
            npx tsx scripts/capture-guide-screenshots.ts --base-url ${{ secrets.PRODUCTION_URL || 'https://paths.limitless-longevity.health' }}
          else
            npx tsx scripts/capture-guide-screenshots.ts --base-url ${{ secrets.PRODUCTION_URL || 'https://paths.limitless-longevity.health' }} --role "$ROLE_ARG"
          fi
        env:
          ADMIN_EMAIL: ${{ secrets.GUIDE_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.GUIDE_ADMIN_PASSWORD }}
          PAID_USER_EMAIL: ${{ secrets.GUIDE_PAID_USER_EMAIL }}
          PAID_USER_PASSWORD: ${{ secrets.GUIDE_PAID_USER_PASSWORD }}
          FREE_USER_EMAIL: ${{ secrets.GUIDE_FREE_USER_EMAIL }}
          FREE_USER_PASSWORD: ${{ secrets.GUIDE_FREE_USER_PASSWORD }}
          ORG_USER_EMAIL: ${{ secrets.GUIDE_ORG_USER_EMAIL }}
          ORG_USER_PASSWORD: ${{ secrets.GUIDE_ORG_USER_PASSWORD }}
          CONTRIBUTOR_EMAIL: ${{ secrets.GUIDE_CONTRIBUTOR_EMAIL }}
          CONTRIBUTOR_PASSWORD: ${{ secrets.GUIDE_CONTRIBUTOR_PASSWORD }}
          EDITOR_EMAIL: ${{ secrets.GUIDE_EDITOR_EMAIL }}
          EDITOR_PASSWORD: ${{ secrets.GUIDE_EDITOR_PASSWORD }}
          PUBLISHER_EMAIL: ${{ secrets.GUIDE_PUBLISHER_EMAIL }}
          PUBLISHER_PASSWORD: ${{ secrets.GUIDE_PUBLISHER_PASSWORD }}

      - name: Verify screenshots
        run: pnpm guide:verify-screenshots

      - name: Check for changes
        id: diff
        run: |
          git add public/guide/screenshots/
          CHANGED=$(git diff --cached --name-only | wc -l)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.diff.outputs.changed > 0
        uses: peter-evans/create-pull-request@v7
        with:
          title: 'docs: refresh guide screenshots'
          body: |
            ## Summary
            - Automated screenshot refresh detected UI changes
            - Captured against production: ${{ secrets.PRODUCTION_URL || 'https://paths.limitless-longevity.health' }}
            - Role: ${{ github.event.inputs.role || 'all' }}

            ## Review
            Check the screenshot diffs below to verify the UI changes are expected.

            Generated by the weekly guide screenshot refresh workflow.
          branch: guide-screenshots-refresh
          commit-message: 'docs: refresh guide screenshots'
          delete-branch: true
