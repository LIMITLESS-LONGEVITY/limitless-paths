name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true  # 16 React Compiler errors (setState in effect) from eslint-plugin-react-hooks v5 — needs per-component refactoring

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true  # 46 Payload type drift errors — generated types don't match runtime behavior

      - name: Run unit tests (no DB required)
        run: pnpm vitest run tests/int/editorial-workflow.int.spec.ts tests/int/access-control.int.spec.ts tests/int/ai-provider.int.spec.ts tests/int/ai-rate-limiter.int.spec.ts tests/int/ai-guardrails.int.spec.ts tests/int/ai-prompts.int.spec.ts tests/int/enrollments.int.spec.ts tests/int/lesson-progress.int.spec.ts tests/int/course-reference-bypass.int.spec.ts tests/int/stripe-service.int.spec.ts tests/int/billing-logic.int.spec.ts tests/int/chunker.int.spec.ts
        env:
          PAYLOAD_SECRET: ci-test-secret-not-real
          AI_PROVIDER_DEFAULT_BASE_URL: https://api.together.xyz/v1
          AI_PROVIDER_DEFAULT_API_KEY: ci-test-key-not-real

      - name: Verify guide screenshots
        run: pnpm guide:verify-screenshots
        continue-on-error: true  # 4 screenshots pending capture — non-blocking until complete

      - name: Build
        run: pnpm build
        env:
          PAYLOAD_SECRET: ci-test-secret-not-real
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          RESEND_API_KEY: re_fake_not_real

  staging-migration:
    name: Test Migrations (Staging DB)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test staging DB connection
        run: node -e "const pg = require('pg'); const c = new pg.Client({connectionString: process.env.DATABASE_URL, ssl: {rejectUnauthorized: false}}); c.connect().then(() => {console.log('Connection OK'); return c.query('SELECT version()');}).then(r => {console.log(r.rows[0].version); c.end();}).catch(e => {console.error('Connection failed:', e.message); process.exit(1);})"
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Run migrations against staging DB
        run: npx tsx scripts/ci-staging-migrate.ts
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.STAGING_PAYLOAD_SECRET }}
          NEXT_PUBLIC_SERVER_URL: https://paths-api.limitless-longevity.health
          RESEND_API_KEY: re_fake_not_real

  integration:
    name: Integration Tests (DB)
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize database schema
        run: npx tsx scripts/ci-migrate.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PAYLOAD_SECRET: ci-test-secret-minimum-32-characters-long
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          RESEND_API_KEY: re_fake_not_real

      - name: Run integration tests (DB required)
        run: pnpm vitest run tests/int/articles.int.spec.ts tests/int/courses.int.spec.ts tests/int/modules-lessons.int.spec.ts tests/int/access-matrix.int.spec.ts tests/int/multi-tenant.int.spec.ts tests/int/enrollment-flow.int.spec.ts tests/int/api.int.spec.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PAYLOAD_SECRET: ci-test-secret-minimum-32-characters-long
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          AI_PROVIDER_DEFAULT_BASE_URL: https://api.together.xyz/v1
          AI_PROVIDER_DEFAULT_API_KEY: ci-test-key-not-real

  e2e:
    name: E2E Tests
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize database schema
        run: npx tsx scripts/ci-migrate.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PAYLOAD_SECRET: ci-test-secret-minimum-32-characters-long
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          RESEND_API_KEY: re_fake_not_real
          REDIS_URL: redis://localhost:6379

      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PAYLOAD_SECRET: ci-test-secret-minimum-32-characters-long
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          REDIS_URL: redis://localhost:6379
