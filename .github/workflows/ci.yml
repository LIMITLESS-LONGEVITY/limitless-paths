name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true  # 46 Payload type drift errors — generated types don't match runtime behavior

      - name: Run unit tests (no DB required)
        run: pnpm vitest run tests/int/editorial-workflow.int.spec.ts tests/int/access-control.int.spec.ts tests/int/ai-provider.int.spec.ts tests/int/ai-rate-limiter.int.spec.ts tests/int/ai-guardrails.int.spec.ts tests/int/ai-prompts.int.spec.ts tests/int/enrollments.int.spec.ts tests/int/lesson-progress.int.spec.ts tests/int/course-reference-bypass.int.spec.ts tests/int/chunker.int.spec.ts
        env:
          PAYLOAD_SECRET: ci-test-secret-not-real
          AI_PROVIDER_DEFAULT_BASE_URL: https://api.together.xyz/v1
          AI_PROVIDER_DEFAULT_API_KEY: ci-test-key-not-real

      - name: Verify guide screenshots
        run: pnpm guide:verify-screenshots
        continue-on-error: true  # 4 screenshots pending capture — non-blocking until complete

      - name: Build
        run: pnpm build
        env:
          PAYLOAD_SECRET: ci-test-secret-not-real
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          RESEND_API_KEY: re_fake_not_real

  validate-payload-schema:
    name: Validate Payload Schema
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect schema changes
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD)
          CONFIG_CHANGED=$(echo "$CHANGED" | grep -c 'payload.config.ts' || true)
          COLLECTIONS_CHANGED=$(echo "$CHANGED" | grep -c 'src/collections/' || true)
          GLOBALS_CHANGED=$(echo "$CHANGED" | grep -c 'src/globals/' || true)
          MIGRATION_ADDED=$(echo "$CHANGED" | grep -c 'src/migrations/' || true)

          if [ "$CONFIG_CHANGED" -gt 0 ] || [ "$COLLECTIONS_CHANGED" -gt 0 ] || [ "$GLOBALS_CHANGED" -gt 0 ]; then
            echo "schema_changed=true" >> $GITHUB_OUTPUT
            echo "config_changed=$CONFIG_CHANGED" >> $GITHUB_OUTPUT
          else
            echo "schema_changed=false" >> $GITHUB_OUTPUT
          fi

          echo "migration_added=$MIGRATION_ADDED" >> $GITHUB_OUTPUT

          LOCALIZED_ADDED=$(git diff origin/main...HEAD -- 'src/collections/' 'src/payload.config.ts' | grep -c '+.*localized.*true' || true)
          echo "localized_added=$LOCALIZED_ADDED" >> $GITHUB_OUTPUT

          NEW_COLLECTION_FILES=$(git diff --name-only --diff-filter=A origin/main...HEAD -- 'src/collections/*/index.ts' 'src/collections/*/index.tsx' || true)
          if [ -n "$NEW_COLLECTION_FILES" ]; then
            echo "new_collections=true" >> $GITHUB_OUTPUT
            echo "new_collection_list<<EOF" >> $GITHUB_OUTPUT
            echo "$NEW_COLLECTION_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "new_collections=false" >> $GITHUB_OUTPUT
          fi

          FIELDS_ADDED=$(git diff origin/main...HEAD -- 'src/collections/' 'src/globals/' | grep -cE "^\+.*name:\s*'" || true)
          echo "fields_added=$FIELDS_ADDED" >> $GITHUB_OUTPUT

      - name: Require migration for schema changes
        if: steps.detect.outputs.schema_changed == 'true'
        run: |
          MIGRATION_ADDED=${{ steps.detect.outputs.migration_added }}
          FIELDS_ADDED=${{ steps.detect.outputs.fields_added }}
          LOCALIZED_ADDED=${{ steps.detect.outputs.localized_added }}

          if [ "$FIELDS_ADDED" -gt 0 ] || [ "$LOCALIZED_ADDED" -gt 0 ]; then
            if [ "$MIGRATION_ADDED" -eq 0 ]; then
              echo "::error::Payload schema fields added/changed but NO migration file found in src/migrations/"
              echo "::error::You MUST run 'pnpm payload migrate:create' and commit the generated migration."
              echo "::error::Fields added: $FIELDS_ADDED | Localization changes: $LOCALIZED_ADDED"
              exit 1
            fi
          fi

          if [ "$MIGRATION_ADDED" -eq 0 ]; then
            echo "::warning::Payload config/collections/globals changed but no migration file added. If you changed field definitions, you MUST add a migration."
          fi

      - name: Reject no-op placeholder migrations
        if: steps.detect.outputs.schema_changed == 'true' && steps.detect.outputs.migration_added != '0'
        run: |
          FAILED=0
          for f in $(git diff --name-only origin/main...HEAD -- 'src/migrations/*.ts'); do
            if echo "$f" | grep -q 'index.ts$'; then continue; fi
            if grep -q "SELECT 1" "$f" && ! grep -qE "CREATE|ALTER|DROP|INSERT|UPDATE|ADD COLUMN" "$f"; then
              echo "::error::Migration $f is a no-op placeholder (SELECT 1 only, no real SQL)."
              echo "::error::Run 'pnpm payload migrate:create' to generate real migration SQL."
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "All migration files contain real SQL statements"

      - name: Check locked_documents_rels for new collections
        if: steps.detect.outputs.new_collections == 'true' && steps.detect.outputs.config_changed != '0'
        run: |
          RELS_COVERED=false
          for f in $(git diff --name-only origin/main...HEAD -- 'src/migrations/*.ts'); do
            if echo "$f" | grep -q 'index.ts$'; then continue; fi
            if grep -q "payload_locked_documents_rels" "$f" 2>/dev/null; then
              RELS_COVERED=true
              break
            fi
          done
          if [ "$RELS_COVERED" = "false" ]; then
            echo "::warning::New collection(s) added with payload.config.ts change, but no migration updates payload_locked_documents_rels."
            echo "::warning::New collections need a FK column in payload_locked_documents_rels. Missing this caused the feedback collection outage (2026-03-30)."
            echo "::warning::Files: ${{ steps.detect.outputs.new_collection_list }}"
          fi

      - name: Validate payload-types.ts is current
        if: steps.detect.outputs.schema_changed == 'true'
        run: |
          TYPES_CHANGED=$(git diff --name-only origin/main...HEAD | grep -c 'src/payload-types.ts' || true)
          if [ "$TYPES_CHANGED" -eq 0 ]; then
            echo "::warning::Payload schema changed but payload-types.ts was not updated. Run 'pnpm payload generate:types' and commit."
          fi

  staging-migration:
    name: Test Migrations (Staging DB)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test staging DB connection
        run: |
          npx tsx -e "
            import pg from 'pg';
            const url = new URL(process.env.DATABASE_URL!);
            const isExternal = url.hostname.includes('-postgres.render.com');
            console.log('External hostname:', isExternal ? 'yes' : 'NO — likely using internal hostname');
            console.log('Has port:', url.port ? 'yes (' + url.port + ')' : 'default (5432)');
            console.log('Has database:', url.pathname.length > 1 ? 'yes' : 'no');
            console.log('Has credentials:', url.username ? 'yes' : 'no');
            const c = new pg.Client({
              connectionString: process.env.DATABASE_URL,
              ssl: { rejectUnauthorized: false }
            });
            (async () => {
              try {
                await c.connect();
                const r = await c.query('SELECT version()');
                console.log('Connection OK');
                console.log(r.rows[0].version);
                await c.end();
              } catch (e: any) {
                console.error('Connection failed:', e.message);
                process.exit(1);
              }
            })();
          "
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Run migrations against staging DB
        run: npx tsx scripts/ci-staging-migrate.ts
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.STAGING_PAYLOAD_SECRET }}
          NEXT_PUBLIC_SERVER_URL: https://paths-api.limitless-longevity.health
          RESEND_API_KEY: re_fake_not_real

  integration:
    name: Integration Tests (DB)
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize database schema
        run: npx tsx scripts/ci-migrate.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PAYLOAD_SECRET: ci-test-secret-minimum-32-characters-long
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          RESEND_API_KEY: re_fake_not_real

      - name: Run integration tests (DB required)
        run: pnpm vitest run tests/int/articles.int.spec.ts tests/int/courses.int.spec.ts tests/int/modules-lessons.int.spec.ts tests/int/access-matrix.int.spec.ts tests/int/multi-tenant.int.spec.ts tests/int/enrollment-flow.int.spec.ts tests/int/api.int.spec.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PAYLOAD_SECRET: ci-test-secret-minimum-32-characters-long
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          AI_PROVIDER_DEFAULT_BASE_URL: https://api.together.xyz/v1
          AI_PROVIDER_DEFAULT_API_KEY: ci-test-key-not-real

  e2e:
    name: E2E Tests
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize database schema
        run: npx tsx scripts/ci-migrate.ts
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PAYLOAD_SECRET: ci-test-secret-minimum-32-characters-long
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          RESEND_API_KEY: re_fake_not_real
          REDIS_URL: redis://localhost:6379

      - name: Install Playwright chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          PAYLOAD_SECRET: ci-test-secret-minimum-32-characters-long
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          REDIS_URL: redis://localhost:6379
